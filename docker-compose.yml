version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: errata_db
    environment:
      POSTGRES_USER: errata_user
      POSTGRES_PASSWORD: errata_pass
      POSTGRES_DB: errata_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U errata_user -d errata_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: errata_api
    environment:
      DATABASE_URL: postgresql://errata_user:errata_pass@db:5432/errata_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
